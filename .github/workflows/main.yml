name: main

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

jobs:
  create_release:
    name: Create release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tag_name: ${{ github.ref }}
          release_name: ${{ github.ref }}
          draft: false
          prerelease: false
  build_android:
    strategy:
      matrix:
        arch: [ "armeabi-v7a", "arm64-v8a", "x86", "x86_64" ]
      fail-fast: false
    name: "android build"
    runs-on: ubuntu-latest
    needs: create_release
    steps:
      - uses: actions/checkout@v3
      - name: Build ${{matrix.arch}}
        run: |
          cmake . -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake -DANDROID_PLATFORM=android-21 -DANDROID_ABI=${{matrix.arch}} -DANDROID_STL=c++_static -DCMAKE_INSTALL_PREFIX=$PWD/piper -B build
          cmake --build build
          cmake --install build
          tar -czf piper_android_${{matrix.arch}}.tar.gz piper
      - name: upload ${{matrix.arch}}
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          upload_url: ${{ needs.create_release.outputs.upload_url }}
          asset_path: piper_android_${{matrix.arch}}.tar.gz
          asset_name: piper_android_${{matrix.arch}}.tar.gz
          asset_content_type: application/octet-stream
